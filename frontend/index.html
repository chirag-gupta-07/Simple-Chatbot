<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Background decoration -->
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        
        <div class="chat-container">
            <header class="chat-header">
                <div class="header-info">
                    <div class="bot-avatar">
                        <i class="fa-solid fa-robot"></i>
                        <div class="status-indicator"></div>
                    </div>
                    <div>
                        <h1>Mistral AI Assistant</h1>
                        <select id="modeSelect" class="mode-select">
                            <option value="Simple">Simple Mode</option>
                            <option value="Angry">Angry Mode</option>
                            <option value="Funny" selected>Funny Mode</option>
                            <option value="Sad">Sad Mode</option>
                        </select>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="icon-btn" title="Settings"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                </div>
            </header>
            
            <main class="chat-messages" id="chatMessages">
                <div class="message system-message">
                    <span>Chat started</span>
                </div>
                
                <div class="message bot">
                    <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                    <div class="message-content">
                        <p>Hello! I'm your funny AI assistant powered by Mistral. Ready to chat? 😄</p>
                        <span class="timestamp">Just now</span>
                    </div>
                </div>
                
            </main>
            
            <div class="typing-indicator" id="typingIndicator">
                <span></span><span></span><span></span>
            </div>
            
            <footer class="chat-input-container">
                <form id="chatForm">
                    <button type="button" class="icon-btn attach-btn"><i class="fa-solid fa-paperclip"></i></button>
                    <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
                    <button type="submit" class="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
                </form>
            </footer>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
